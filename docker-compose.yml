version: "3.9"

# Cybersecurity Nexus - Local Neo4j Graph Database
# Run: docker compose up -d
# Browser: http://localhost:7474  (neo4j / nexus_password)
# Bolt:    bolt://localhost:7687

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: nexus-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      # Default credentials for LOCAL DEVELOPMENT ONLY.
      # Change this if you expose Neo4j outside localhost. Override at runtime:
      #   NEO4J_AUTH=neo4j/$YOUR_PASSWORD docker compose up -d
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/nexus_password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "1G"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins
      - ./data/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
