# =====================================================================
#  NikruvX / Cyber Nexus -- full local stack
# =====================================================================
#  Default:           docker compose up -d            (Neo4j + API)
#  With Ollama (CPU): docker compose --profile ollama up -d
#  With Ollama (GPU): docker compose --profile gpu up -d
#  Debug only Neo4j:  docker compose up -d neo4j
#
#  Browser: http://localhost:8000/  (UI)
#           http://localhost:7474/  (Neo4j Browser, neo4j / nexus_password)
# =====================================================================

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: nikruvx-neo4j
    hostname: neo4j               # explicit hostname so log4j2 can resolve it
    extra_hosts:
      - "neo4j:127.0.0.1"          # ensure local resolution inside container
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      # Default credentials for LOCAL DEVELOPMENT ONLY.
      # Override at runtime: NEO4J_AUTH=neo4j/$YOUR docker compose up -d
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/nexus_password}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      # Modern Neo4j 5.x setting names (the dbms.memory.* names are deprecated)
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP:-2G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_CACHE:-1G}"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins
      - ./data/neo4j/import:/var/lib/neo4j/import
    healthcheck:
      # `wget` ships in the Neo4j Debian image. The explicit --timeout=5 is
      # critical -- without it wget can hang on a half-open socket forever.
      test: ["CMD-SHELL",
             "wget --no-verbose --tries=1 --timeout=5 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 8s
      retries: 30
      start_period: 90s   # APOC download on first boot can take 30-60s on slow links
    networks: [nikruvx]

  api:
    image: python:3.12-slim
    container_name: nikruvx-api
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "
        pip install --no-cache-dir -r requirements.txt &&
        python -c 'from engine.graph import apply_schema; apply_schema()' &&
        python -m uvicorn api.server:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-nexus_password}"
      OLLAMA_URL: "${OLLAMA_URL:-http://ollama:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      OLLAMA_EMBED_MODEL: "${OLLAMA_EMBED_MODEL:-nomic-embed-text}"
      NVD_API_KEY: "${NVD_API_KEY:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
    volumes:
      - .:/app
    depends_on:
      neo4j:
        # service_started: don't block API startup on Neo4j healthcheck flakiness.
        # The API has its own retry-on-startup logic for Neo4j connectivity.
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\", timeout=3)'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks: [nikruvx]

  # -------- optional: Ollama for the local LLM features --------
  # Activate with:  docker compose --profile ollama up -d
  ollama:
    image: ollama/ollama:latest
    container_name: nikruvx-ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [nikruvx]

  # -------- optional: Ollama with GPU (NVIDIA) --------
  # Activate with:  docker compose --profile gpu up -d
  # Requires nvidia-container-toolkit on the host.
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: nikruvx-ollama-gpu
    restart: unless-stopped
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [nikruvx]

networks:
  nikruvx:
    name: nikruvx
    driver: bridge
